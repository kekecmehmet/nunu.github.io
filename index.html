<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUNU!</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header class="hero">
            <h1 class="main-title">İyi ki Doğdun Annem</h1>
            <p class="subtitle">Dünyanın en güzel ve en özel annesine🧡</p>
        </header>

        <section class="gallery">
            <div class="gallery-track">
                <div class="photo-card" style="--delay: 0.1s">
                    <img src="assets/photo_1.png" alt="Doğum günü anısı 1">
                    <div class="photo-caption">Birlikte geçirdiğimiz güzel anılar...</div>
                </div>
                <div class="photo-card" style="--delay: 0.3s">
                    <img src="assets/photo_2.png" alt="Doğum günü anısı 2">
                    <div class="photo-caption">Seninle her anımız kutlamaya değer.</div>
                </div>
                <div class="photo-card" style="--delay: 0.5s">
                    <img src="assets/photo_3.png" alt="Doğum günü anısı 3">
                    <div class="photo-caption">Seni her şeyden çok seviyoruz.</div>
                </div>
            </div>
        </section>

        <section class="video-note">
            <h2 class="section-title">Bizden Sana Ufak Bir Mesaj 🧡</h2>
            <div class="video-wrapper">
                <!-- Replace the video source below with your actual video later -->
                <video controls>
                    <source src="assets/video.mp4" type="video/mp4">
                    <!-- Example: <source src="assets/video.mp4" type="video/mp4"> -->
                    Tarayıcınız video etiketini desteklemiyor.
                </video>
            </div>
            <p class="footer-msg">Senin varlığın en güzel hediyemiz. Nice güzel yaşlarına.</p>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
